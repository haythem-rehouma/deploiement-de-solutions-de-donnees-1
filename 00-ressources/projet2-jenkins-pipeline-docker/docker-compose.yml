services:
  jenkins:
    build: .
    container_name: jenkins-tp
    ports:
      - "8080:8080"      # interface web de Jenkins
      - "50000:50000"    # communication avec les agents (optionnel)
    volumes:
      # Toutes les donnees de Jenkins (config, jobs, plugins) sont conservees ici
      - jenkins-data:/var/jenkins_home
    restart: unless-stopped

volumes:
  jenkins-data:
